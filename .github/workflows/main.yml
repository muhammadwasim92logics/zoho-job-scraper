name: Zoho Job Scraper

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install requests beautifulsoup4 lxml
    
    - name: Run Phase 1
      run: python phase1_scraper.py
    
    - name: Run Phase 2
      run: python phase2_contacts.py
    
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: zoho-companies-data
        path: |
          *.csv
          *.json
        retention-days: 30
